<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS System | Admin</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .pos-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
      height: calc(100vh - 150px);
    }
    .pos-products {
      background: var(--surface-color);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    .pos-product-card {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 0.5rem;
      cursor: pointer;
      text-align: center;
      transition: all var(--transition-fast);
    }
    .pos-product-card:hover {
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }
    .pos-product-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      margin-bottom: 0.5rem;
    }
    .pos-product-title {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }
    .pos-product-price {
      font-weight: 700;
      color: var(--primary-color);
    }
    .pos-register {
      background: var(--surface-color);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }
    .register-items {
      flex-grow: 1;
      overflow-y: auto;
      margin-bottom: 1rem;
    }
    .register-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px dashed var(--border-color);
    }
    .register-summary {
      border-top: 2px solid var(--border-color);
      padding-top: 1rem;
    }
    @media (max-width: 1023px) {
      .pos-layout {
        grid-template-columns: 1fr;
        height: auto;
        gap: 1.5rem;
      }
      .pos-products {
        height: 500px !important;
      }
      .register-items {
        max-height: 300px;
        overflow-y: auto;
      }
    }
  </style>
</head>
<body class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">Anjiana Store ADMIN</div>
    <nav class="admin-nav">
      <a href="dashboard.html">Products</a>
      <a href="add-product.html">Add New Product</a>
      <a href="pos.html" class="active">POS System</a>
      <a href="orders.html">Orders</a>
      <a href="#">Customers</a>
      <a href="#">Settings</a>
    </nav>
    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 1rem;">
      <a href="#" id="goToStoreBtn" style="color: var(--accent-color); font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
        <span>🏪</span> Go to Store
      </a>
      <a href="#" id="logoutBtn" style="color: rgba(255,255,255,0.5); font-size: 0.9rem; text-decoration: none;">Logout</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-content">
    
    <header class="admin-header" style="margin-bottom: 1.5rem;">
      <div>
        <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Point of Sale</h1>
        <p class="text-muted">Process in-store orders quickly.</p>
      </div>
      <div>
        <div id="liveClock" class="premium-clock"></div>
      </div>
    </header>

    <div class="pos-layout">
      <!-- Left: Products -->
      <div style="display: flex; flex-direction: column; gap: 1rem; height: 100%; overflow: hidden;">
        <input type="text" id="posSearch" class="form-control" placeholder="Search products by name or category..." style="background: var(--surface-color); color: var(--primary-color);">
        <div class="pos-products" id="posProductGrid" style="height: 100%;">
          <div style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 2rem;">Loading products...</div>
        </div>
      </div>

      <!-- Right: Register -->
      <div class="pos-register">
        <h3 style="margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">Current Sale</h3>
        
        <div class="register-items" id="registerItems">
          <div style="text-align: center; color: var(--text-muted); padding: 2rem; font-size: 0.9rem;">No items in cart</div>
        </div>

        <div class="register-summary">
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span class="text-muted">Subtotal</span>
            <span id="posSubtotal">$0.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span class="text-muted">Tax (0%)</span>
            <span id="posTax">$0.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 1.3rem; font-weight: 700;">
            <span>Total</span>
            <span id="posTotal">$0.00</span>
          </div>
          <button id="completeSaleBtn" class="btn btn-primary" style="width: 100%; padding: 16px;" disabled>Complete Sale</button>
        </div>
      </div>
    </div>

  </main>

  <script src="js/app.js"></script>
  <script type="module" src="js/admin-auth.js"></script>
  <script type="module" src="js/admin-pos.js"></script>
</body>
</html>
